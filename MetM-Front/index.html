<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://thomasr35.github.io/MetM-Front/" />

    <script src="tarteaucitron/tarteaucitron.min.js"></script>
    <script>
      const privacyUrl =
        window.location.origin +
        window.location.pathname +
        "#/mentions-legales";

      tarteaucitron.init({
        privacyUrl: privacyUrl,
        bodyPosition: "top",
        hashtag: "#tarteaucitron",
        cookieName: "tarteaucitron",
        orientation: "middle",
        groupServices: true,
        showDetailsOnClick: true,
        serviceDefaultState: "wait",
        showAlertSmall: false,
        cookieslist: false,
        closePopup: true,
        showIcon: true,
        iconPosition: "BottomRight",
        adblocker: false,
        DenyAllCta: true,
        AcceptAllCta: true,
        highPrivacy: true,
        alwaysNeedConsent: false,
        handleBrowserDNTRequest: false,
        removeCredit: false,
        moreInfoLink: true,
        useExternalCss: false,
        useExternalJs: false,
        readmoreLink: "",
        mandatory: true,
        mandatoryCta: false,
        googleConsentMode: true,
        bingConsentMode: true,
        softConsentMode: false,
        dataLayer: false,
        serverSide: false,
        partnersList: true,
      });

      window.addEventListener("load", () => {
        const link = document.getElementById("tarteaucitronLinkPrivacy");
        if (link) {
          link.href = privacyUrl;
          link.addEventListener("click", () => {
            tarteaucitron.userInterface?.closePanel();
          });
        }
      });
    </script>

    <meta property="og:title" content="Marcelle et Maurice Shop" />
    <meta
      property="og:description"
      content="Bienvenue sur le site de Marcelle et Maurice ! Personnalisez vos objets préférés avec vos photos personnelles !"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thomasr35.github.io/MetM-Front/" />
    <meta
      property="og:image"
      content="https://thomasr35.github.io/MetM-Front/image/metm.png"
    />
    <meta property="og:image:alt" content="Logo Marcelle et Maurice Shop" />
    <meta property="article:author" content="Thomas Riou" />
    <title>Marcelle et Maurice Shop</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="src/main.jsx"></script>
  </body>
</html>
